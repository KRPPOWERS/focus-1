name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download Gradle Wrapper JAR
        run: curl -sL "https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar

      - name: Fix Java source issues
        run: |
          cat > /tmp/fix.py << ENDOFSCRIPT
          import os, glob, re
          for path in glob.glob("app/src/**/*.java", recursive=True):
              with open(path, "r", encoding="utf-8", errors="ignore") as f:
                  content = f.read()
              new = content
              new = new.replace("\u201c", '\\"').replace("\u201d", '\\"')
              new = new.replace("\u2018", "'").replace("\u2019", "'")
              new = new.replace("\u2013", "-").replace("\u2014", "-")
              new = re.sub(
                  r"TextView tvEmpty = findViewById\(R\.id\.tvEmpty\);\s*"
                  r"tvEmpty\.setVisibility\(android\.view\.View\.VISIBLE\);\s*"
                  r"tvEmpty\.setText\(\"Error loading apps: \" \+ e\.getMessage\(\)\);",
                  "((android.widget.TextView)findViewById(R.id.tvEmpty)).setVisibility(android.view.View.VISIBLE);\n"
                  "                    ((android.widget.TextView)findViewById(R.id.tvEmpty)).setText(\"Error loading apps: \" + e.getMessage());",
                  new
              )
              if new != content:
                  with open(path, "w", encoding="utf-8") as f:
                      f.write(new)
                  print("Fixed: " + path)
          print("Done")
          ENDOFSCRIPT
          python3 /tmp/fix.py

      - name: Verify Gradle version
        run: gradle --version

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FocusGuard-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
