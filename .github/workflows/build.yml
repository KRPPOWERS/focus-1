name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download Gradle Wrapper JAR
        run: |
          curl -sL "https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Fix Java source issues
        run: |
          python3 << 'PYEOF'
          import os, glob, re

          for path in glob.glob('app/src/**/*.java', recursive=True):
              with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                  content = f.read()
              new = content

              # Fix 1: curly/smart quotes -> straight quotes
              new = new.replace('\u201c', '\\"').replace('\u201d', '\\"')
              new = new.replace('\u2018', "'").replace('\u2019', "'")
              new = new.replace('\u2013', '-').replace('\u2014', '-')

              # Fix 2: duplicate tvEmpty variable in AppSelectorActivity
              # Remove the second declaration inside the catch block
              new = new.replace(
                  'TextView tvEmpty = findViewById(R.id.tvEmpty);\n                    tvEmpty.setVisibility(android.view.View.VISIBLE);\n                    tvEmpty.setText("Error loading apps: " + e.getMessage());',
                  'findViewById(R.id.tvEmpty).setVisibility(android.view.View.VISIBLE);\n                    ((andro
